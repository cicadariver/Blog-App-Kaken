<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブログ一覧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>Log</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2 class="page-title">ブログ一覧</h2>

      <div class="top-actions">
        <a href="blog-register.html" class="btn">新規登録</a>
      </div>

      <div class="blog-list">
        <article class="blog-item">
          <h3 class="blog-title">サンプルブログタイトル 1</h3>
          <p class="blog-meta">カテゴリ：日記　作成日：2026/05/18</p>
          <p class="blog-text">
            これはブログ記事のサンプル本文です。ブログ一覧画面では、記事のタイトル、カテゴリ、本文の一部を表示します。
          </p>

          <div class="blog-actions">
            <a href="blog-edit.html" class="btn">編集</a>
            <a href="blog-edit.html" class="btn btn-danger">削除</a>
          </div>
        </article>

        <article class="blog-item">
          <h3 class="blog-title">サンプルブログタイトル 2</h3>
          <p class="blog-meta">カテゴリ：学習　作成日：2026/05/18</p>
          <p class="blog-text">
            HTMLとCSSを使って、ブログ管理システムの画面を作成しています。
          </p>

          <div class="blog-actions">
            <a href="blog-edit.html" class="btn">編集</a>
            <a href="blog-edit.html" class="btn btn-danger">削除</a>
          </div>
        </article>

        <article class="blog-item">
          <h3 class="blog-title">サンプルブログタイトル 3</h3>
          <p class="blog-meta">カテゴリ：その他　作成日：2026/05/18</p>
          <p class="blog-text">
            今後はSpring Bootを使用して、登録・編集・削除などの機能を実装します。
          </p>

          <div class="blog-actions">
            <a href="blog-edit.html" class="btn">編集</a>
            <a href="blog-edit.html" class="btn btn-danger">削除</a>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
