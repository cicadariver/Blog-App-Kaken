<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ブログ登録</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1>Log - ブログ管理システム</h1>
  </header>

  <main class="container">
    <section class="card">
      <h2 class="page-title">ブログ登録</h2>

      <form action="/blogs/create" method="post" enctype="multipart/form-data">
        <div class="form-group">
          <label for="blogTitle">ブログタイトル</label>
          <input type="text" id="blogTitle" name="blogTitle" required>
        </div>

        <div class="form-group">
          <label for="categoryName">カテゴリ名</label>
          <select id="categoryName" name="categoryName" required>
            <option value="">選択してください</option>
            <option value="日記">日記</option>
            <option value="学習">学習</option>
            <option value="趣味">趣味</option>
            <option value="その他">その他</option>
          </select>
        </div>

        <div class="form-group">
          <label for="blogImage">ブログ画像URL</label>
          <input type="file" id="blogImage" name="blogImage" placeholder="例：images/sample.jpg">
        </div>

        <div class="form-group">
          <label for="article">ブログ記事</label>
          <textarea id="article" name="article" required></textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn">登録</button>
          <a href="login.html" class="btn btn-secondary">戻る</a>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
